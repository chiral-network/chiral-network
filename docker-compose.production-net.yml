# Docker Compose — nodes connect to the PRODUCTION relay at 130.245.173.73:4001
# No local relay needed. Uses host networking so nodes reach the real relay directly.
#
# Usage:
#   docker compose -f docker-compose.production-net.yml up -d
#   docker compose -f docker-compose.production-net.yml logs -f
#   docker compose -f docker-compose.production-net.yml down

x-node: &node-defaults
  image: chiral-network-node
  network_mode: host
  init: true
  privileged: true
  security_opt:
    - seccomp:unconfined
  environment:
    - CHIRAL_AUTO_START_DHT=true
  restart: unless-stopped

services:
  node-1:
    <<: *node-defaults
    container_name: chiral-prod-node-1
    command: ["--port", "9501", "--auto-start-dht"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9501/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

