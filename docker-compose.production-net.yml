# 30 Docker nodes connecting to production relay at 130.245.173.73:4001
# Uses host networking — no local relay needed.

x-node: &node-defaults
  image: chiral-network-node
  network_mode: host
  init: true
  privileged: true
  security_opt:
    - seccomp:unconfined
  environment:
    - CHIRAL_AUTO_START_DHT=true
  restart: unless-stopped

services:
  node-1:
    <<: *node-defaults
    container_name: chiral-prod-node-1
    command: ["--port", "9501", "--auto-start-dht"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9501/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  node-2:
    <<: *node-defaults
    container_name: chiral-prod-node-2
