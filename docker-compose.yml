# =============================================================================
# Chiral Network — Docker Compose for scaled testing
#
# Usage:
#   docker compose up -d                    # Start relay + 3 test nodes
#   docker compose up -d --scale node=10    # Start relay + 10 test nodes
#   docker compose logs -f node             # Watch node logs
#   docker compose exec node-1 chiral wallet create  # Run CLI on node 1
#   docker compose down -v                  # Tear down everything
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Bootstrap relay server — all nodes connect to this
  # ---------------------------------------------------------------------------
  relay:
    build:
      context: .
      target: relay
    container_name: chiral-relay
    ports:
      - "4001:4001"
      - "8080:8080"
    volumes:
      - relay-data:/data
    environment:
      - CHIRAL_WALLET_EMAIL_SMTP_HOST=127.0.0.1
      - CHIRAL_WALLET_EMAIL_SMTP_PORT=25
      - CHIRAL_WALLET_EMAIL_FROM=noreply@chiral-test.local
      - CHIRAL_WALLET_EMAIL_SMTP_STARTTLS=false
    networks:
      chiral-net:
        aliases:
          - relay.chiral.local
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Test nodes — scalable P2P participants
  # ---------------------------------------------------------------------------
  node:
    build:
      context: .
      target: test-node
    deploy:
      replicas: 3
    environment:
      # Point all nodes at the relay for bootstrapping
      - CHIRAL_BOOTSTRAP_NODES=enode://placeholder@relay.chiral.local:30303
      - CHIRAL_RPC_ENDPOINT=http://relay.chiral.local:8080
    volumes:
      - node-data:/data
    expose:
      - "9419"
      - "30303"
    networks:
      - chiral-net
    depends_on:
      - relay
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Dedicated seeder node — publishes and seeds test files
  # ---------------------------------------------------------------------------
  seeder:
    build:
      context: .
      target: test-node
    container_name: chiral-seeder
    environment:
      - CHIRAL_BOOTSTRAP_NODES=enode://placeholder@relay.chiral.local:30303
      - CHIRAL_RPC_ENDPOINT=http://relay.chiral.local:8080
    volumes:
      - seeder-data:/data
      - ./tests/fixtures:/fixtures:ro
    expose:
      - "9419"
      - "30303"
    networks:
      - chiral-net
    depends_on:
      - relay
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Test runner — executes load/stress tests against the network
  # ---------------------------------------------------------------------------
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    container_name: chiral-test-runner
    environment:
      - RELAY_URL=http://relay.chiral.local:8080
      - SEEDER_URL=http://chiral-seeder:9419
    volumes:
      - ./tests:/app/tests:ro
      - ./src:/app/src:ro
      - test-results:/app/results
    networks:
      - chiral-net
    depends_on:
      - relay
      - seeder
    profiles:
      - test

networks:
  chiral-net:
    driver: bridge

volumes:
  relay-data:
  node-data:
  seeder-data:
  test-results:
