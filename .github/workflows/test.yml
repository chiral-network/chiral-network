name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run frontend type check
        run: npx svelte-check --tsconfig ./tsconfig.json --fail-on-warnings false

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "rust-build"
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            curl \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
        timeout-minutes: 10

      - name: Check if backend compiles
        run: |
          cd src-tauri
          cargo check --lib
          cargo check --bins
        timeout-minutes: 10

      - name: Run backend unit tests
        run: |
          cd src-tauri
          cargo test --lib
        timeout-minutes: 10

      - name: Run Rust formatting check
        run: |
          cd src-tauri
          cargo fmt --check
        continue-on-error: true

      - name: Run Clippy lints
        run: |
          cd src-tauri
          cargo clippy --lib -- -D warnings
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "rust-build"
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            curl \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
        timeout-minutes: 10

      - name: Run relay circuit integration tests
        run: |
          cd src-tauri
          cargo test --test relay_circuit_test -- --test-threads=1
        timeout-minutes: 10
        continue-on-error: true
